<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DigitalFit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="register">
    <header>
        <h1>DigitalFit Registration</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <div class="login-container">
            <h2>Create Account</h2>
            <form id="registerForm">
                <label for="regUsername">Username:</label>
                <input type="text" id="regUsername" required minlength="3" maxlength="20" autocomplete="username">

                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" required minlength="6" autocomplete="new-password">

                <label for="regConfirmPassword">Confirm Password:</label>
                <input type="password" id="regConfirmPassword" required minlength="6" autocomplete="new-password">

                <label for="regRole">I am a:</label>
                <select id="regRole" required>
                    <option value="">Select Role</option>
                    <option value="user">Gym User</option>
                    <option value="coach">Fitness Coach</option>
                    <option value="adviser">Health Adviser</option>
                </select>

                <div id="regDocumentGroup" class="hidden">
                    <label for="regDocument">Certification / ID document (image):</label>
                    <input type="file" id="regDocument" accept="image/*">
                    <p class="hint">Coaches and health advisers must upload an image (e.g. certificate or ID) for an admin to review. You won't be able to log in until your account is approved.</p>
                </div>

                <div id="registerMessage" class="status-message" style="display:none;"></div>

                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 DigitalFit. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>

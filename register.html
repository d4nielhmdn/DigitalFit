<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DigitalFit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>DigitalFit Registration</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <div class="login-container">
            <h2>Register</h2>
            <form id="registerForm">
                <label for="regUsername">Username:</label>
                <input type="text" id="regUsername" required>

                <label for="regRole">Role:</label>
                <select id="regRole" required>
                    <option value="">Select Role</option>
                    <option value="user">Gym User</option>
                    <option value="coach">Fitness Coach</option>
                    <option value="adviser">Health Adviser</option>
                    <option value="admin">Admin</option>
                </select>

                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 DigitalFit. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>

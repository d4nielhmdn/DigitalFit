<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DigitalFit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
    <header>
        <h1>DigitalFit Login</h1>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>
    <main>
        <div class="login-container">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username">Username:</label>
                <input type="text" id="username" required autocomplete="username">

                <label for="password">Password:</label>
                <input type="password" id="password" required autocomplete="current-password">

                <label for="role">Role:</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">Gym User</option>
                    <option value="coach">Fitness Coach</option>
                    <option value="adviser">Health Adviser</option>
                    <option value="admin">Admin</option>
                </select>

                <div id="loginMessage" class="status-message" style="display:none;"></div>

                <button type="submit">Login</button>
            </form>
            <p>New user? <a href="register.html">Register here</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 DigitalFit. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
